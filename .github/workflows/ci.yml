name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      - run: npm install --no-save --no-package-lock typescript@~5.6 @types/node@~20
      - run: npx tsc --noEmit
